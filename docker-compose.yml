services:
  gaggiuino-shadow:
    build: .
    container_name: gaggiuino-shadow
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - gaggiuino_data:/data
    environment:
      - GAGGIUINO_URL=http://gaggiuino.local
      - POLL_INTERVAL=30
      - FULL_SYNC_INTERVAL=600
      - DB_PATH=/data/gaggiuino_shadow.db
      - LOG_LEVEL=INFO

volumes:
  gaggiuino_data:
